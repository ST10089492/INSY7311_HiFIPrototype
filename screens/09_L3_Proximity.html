<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUpLife - Hi-Fi Prototype Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head><body style='background:#08080C;padding:30px;display:flex;justify-content:center;'><div class='board' style='padding:0;'><div class='screen-wrap'>
<div class="screen-wrap">
  <div class="phone" id="L3">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span class="right">●●● 5G ▮▮</span></div>
    <div class="scr">
      <div class="pad" style="padding-top:16px;display:flex;align-items:center;gap:12px;">
        <span style="font-size:22px;">←</span><div class="title">New Quest</div>
      </div>
      <div class="pad" style="margin-top:24px;display:flex;flex-direction:column;gap:24px;">
        <!-- Group A -->
        <div style="display:flex;flex-direction:column;gap:4px;">
          <span class="form-label">Quest Name</span>
          <div style="height:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;padding:0 14px;color:var(--text-secondary);font-size:14px;">e.g. Study for exam</div>
        </div>
        <!-- Group B -->
        <div style="display:flex;flex-direction:column;gap:4px;">
          <span class="form-label">Category</span>
          <div style="display:flex;gap:8px;"><div class="pill active">Academic</div><div class="pill">Health</div><div class="pill">Personal</div></div>
        </div>
        <!-- Group C -->
        <div style="display:flex;flex-direction:column;gap:4px;">
          <span class="form-label">XP Reward</span>
          <div style="height:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;padding:0 14px;color:var(--text-secondary);font-size:14px;">e.g. 50</div>
        </div>
        <!-- Group D -->
        <div style="display:flex;flex-direction:column;gap:4px;">
          <span class="form-label">Due Date (Optional)</span>
          <div style="height:52px;background:var(--surface);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;padding:0 14px;color:var(--text-secondary);font-size:14px;">DD / MM / YYYY</div>
        </div>
        <!-- Group E -->
        <div style="display:flex;flex-direction:column;gap:4px;">
          <span class="form-label">Repeat</span>
          <div style="display:flex;gap:8px;"><div class="pill active">Daily</div><div class="pill">Weekly</div><div class="pill">Once</div></div>
        </div>
        <!-- actions -->
        <div style="display:flex;gap:12px;margin-top:8px;">
          <div class="btn btn-ghost" style="width:164px;">Cancel</div>
          <div class="btn btn-primary" style="width:164px;">Save Quest</div>
        </div>
      </div>
    </div>
    <div class="navbar">
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></div>
      <div class="nav-tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8M4 6h6M4 12h3M4 18h6"/></svg><span>Quests</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z"/></svg><span>Rewards</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg><span>Guild</span></div>
    </div>
  </div>
  
</div>

</div></div></body></html>
