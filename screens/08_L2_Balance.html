<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUpLife - Hi-Fi Prototype Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head><body style='background:#08080C;padding:30px;display:flex;justify-content:center;'><div class='board' style='padding:0;'><div class='screen-wrap'>
<div class="screen-wrap">
  <div class="phone" id="L2">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span class="right">●●● 5G ▮▮</span></div>
    <div class="scr" style="position:relative;">
      <div class="pad" style="padding-top:16px;"><div class="title" style="text-align:center;">Quest Board</div></div>
      <div class="pad filter-row" style="margin-top:16px;justify-content:space-between;"><div class="pill active">All</div><div class="pill">Academic</div><div class="pill">Health</div><div class="pill">Personal</div></div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:24px;">
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Complete assignment</span><span class="qc-xp"><span class="gold">+80 XP</span></span></div><span class="tag">Academic</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Attend gym session</span><span class="qc-xp"><span class="gold">+50 XP</span></span></div><span class="tag">Health</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Read for 30 min</span><span class="qc-xp"><span class="gold">+40 XP</span></span></div><span class="tag">Personal</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Drink 2L of water</span><span class="qc-xp"><span class="gold">+20 XP</span></span></div><span class="tag">Health</span></div>
      </div>
      <!-- centre line -->
      <div style="position:absolute;top:0;bottom:0;left:50%;width:0;border-left:2px dashed rgba(255,59,48,.6);"></div>
    </div>
    <div class="navbar">
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></div>
      <div class="nav-tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8M4 6h6M4 12h3M4 18h6"/></svg><span>Quests</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z"/></svg><span>Rewards</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg><span>Guild</span></div>
    </div>
  </div>
  
</div>

</div></div></body></html>
