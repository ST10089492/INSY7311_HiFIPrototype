<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUpLife - Hi-Fi Prototype Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head><body style='background:#08080C;padding:30px;display:flex;justify-content:center;'><div class='board' style='padding:0;'><div class='screen-wrap'>
<div class="screen-wrap">
  <div class="phone" id="L1">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span class="right">●●● 5G ▮▮</span></div>
    <div class="scr">
      <div style="display:flex;flex-direction:column;align-items:center;margin-top:24px;">
        <div style="width:80px;height:80px;border-radius:50%;background:var(--purple-tint);display:flex;align-items:center;justify-content:center;color:var(--purple-500);font-size:34px;font-weight:700;">S</div>
        <div style="font-size:22px;font-weight:700;margin-top:12px;">Student Username</div>
        <div style="background:var(--purple-500);color:#fff;font-size:14px;font-weight:600;padding:6px 14px;border-radius:20px;margin-top:8px;">Level 7 - Scholar</div>
        <div class="xpbar" style="width:350px;height:16px;margin-top:16px;"><div class="fill" style="width:62%;"></div></div>
        <div style="font-size:13px;font-weight:500;color:var(--gold-400);margin-top:6px;">620 / 1000 XP</div>
      </div>
      <div style="display:flex;justify-content:space-around;margin-top:24px;padding:0 20px;">
        <div style="text-align:center;"><div style="font-size:20px;font-weight:700;">12</div><div style="font-size:11px;color:var(--text-secondary);">Quests</div></div>
        <div style="text-align:center;"><div style="font-size:20px;font-weight:700;">5</div><div style="font-size:11px;color:var(--text-secondary);">Streak</div></div>
        <div style="text-align:center;"><div style="font-size:20px;font-weight:700;">3</div><div style="font-size:11px;color:var(--text-secondary);">Badges</div></div>
      </div>
      <div class="pad" style="margin-top:24px;"><div class="divider"></div></div>
      <div class="pad" style="margin-top:20px;"><div class="sec-label">ACTIVE QUESTS</div></div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Complete assignment</span><span class="qc-xp"><span class="gold">+80 XP</span></span></div><span class="tag">Academic</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Attend gym session</span><span class="qc-xp"><span class="gold">+50 XP</span></span></div><span class="tag">Health</span></div>
      </div>
    </div>
    <div class="navbar">
      <div class="nav-tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8M4 6h6M4 12h3M4 18h6"/></svg><span>Quests</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z"/></svg><span>Rewards</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg><span>Guild</span></div>
    </div>
  </div>
  
</div>

</div></div></body></html>
