<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LevelUpLife - Hi-Fi Prototype Screens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
</head><body style='background:#08080C;padding:30px;display:flex;justify-content:center;'><div class='board' style='padding:0;'><div class='screen-wrap'>
<div class="screen-wrap">
  <div class="phone" id="L5">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span class="right">●●● 5G ▮▮</span></div>
    <div class="scr">
      <div class="pad" style="padding-top:16px;display:flex;align-items:center;gap:10px;">
        <div style="width:40px;height:40px;border-radius:50%;background:var(--purple-tint);display:flex;align-items:center;justify-content:center;color:var(--purple-500);font-weight:700;">S</div>
        <div><div style="font-size:16px;font-weight:600;">Student Username</div><div style="font-size:13px;color:var(--text-secondary);">Level 7 - Scholar</div></div>
      </div>
      <div class="pad" style="margin-top:12px;"><div class="xpbar" style="width:100%;"><div class="fill" style="width:62%;"></div></div></div>
      <div style="display:flex;justify-content:center;margin-top:20px;">
        <div style="display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:500;"><svg width="16" height="16" viewBox="0 0 24 24" fill="var(--gold-400)" stroke="none"><path d="M12 2c1 3-1 5-2 6.5C8.5 10 8 11.5 8 13a4 4 0 008 0c0-1.2-.4-2.3-1-3.2.8.4 1.5 1 2 1.9.6 1 .9 2.1.9 3.3a6 6 0 11-12 0c0-2.4 1.2-4.3 2.5-6C9.8 6.5 11 4.7 12 2z"/></svg> 7 Day Streak</div>
      </div>
      <div class="pad" style="margin-top:28px;"><div class="sec-label">TODAY'S FOCUS</div></div>
      <div style="display:flex;flex-direction:column;gap:12px;margin-top:12px;">
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Complete assignment</span><span class="qc-xp"><span class="gold">+80 XP</span></span></div><span class="tag">Academic</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Attend gym session</span><span class="qc-xp"><span class="gold">+50 XP</span></span></div><span class="tag">Health</span></div>
        <div class="quest-card"><div class="checkbox"></div><div class="qc-mid"><span class="body-strong">Read for 30 min</span><span class="qc-xp"><span class="gold">+40 XP</span></span></div><span class="tag">Personal</span></div>
      </div>
      <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--purple-500);">View all quests</div>
      <!-- deliberate empty space -->
    </div>
    <div class="navbar">
      <div class="nav-tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8M5 10v10h14V10"/></svg><span>Home</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3 8-8M4 6h6M4 12h3M4 18h6"/></svg><span>Quests</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 01-10 0V4z"/></svg><span>Rewards</span></div>
      <div class="nav-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3 3-5 6-5s6 2 6 5"/></svg><span>Guild</span></div>
    </div>
  </div>
  </div>

</div></div></body></html>
